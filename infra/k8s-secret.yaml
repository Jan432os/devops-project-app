apiVersion: v1
kind: Secret
metadata:
  name: ticketing-secrets
  namespace: ticketing
type: Opaque
stringData:
  POSTGRES_USER: ticketing_user
  POSTGRES_PASSWORD: change_me_local
  POSTGRES_DB: ticketing_user
  POSTGRES_HOST: postgres
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  QUEUE_NAME: ticket_orders
  API_PORT: "8080"
  FRONTEND_PORT: "3000"
  NODE_ENV: production
